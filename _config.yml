# Seisly Documentation Configuration
title: Seisly
tagline: The Professional Rust-Powered Seismic Studio
description: Extreme performance seismic interpretation and modeling platform.

# GitHub Pages Settings
url: "https://ajamj.github.io"
baseurl: "/seisly" # Crucial: Fixes broken links and CSS paths
repository: ajamj/seisly

# Theme Settings
theme: just-the-docs

# Color Scheme & UI
color_scheme: dark
aux_links:
  "GitHub Repository":
    - "https://github.com/ajamj/seisly"

# Nav Settings
nav_sort: case_insensitive

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty

# Exclude internal planning and temporary files
exclude:
  - .planning/
  - .superpowers/
  - target/
  - crates/
  - python/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - .git/
  - .github/
